openapi: "3.0.0"
info:
  title: "Flickr Backend API"
  version: "1.0.0"
  description: "API documentation for Flickr Backend Project"
servers:
  - url: "https://flickr-project-backend-6.onrender.com"
    description: "Production server"
  - url: "http://localhost:8080"
    description: "Development server (cleartext - do not use for production)"
components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"

paths:
  # ────────────── Auth ──────────────
  /api/auth/signup:
    post:
      tags:
        - Auth
      summary: "Register new account"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "201":
          description: "Registration successful"
        "400":
          description: "Invalid data"
        "409":
          description: "Username already exists"

  /api/auth/signin:
    post:
      tags:
        - Auth
      summary: "Login"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: "Login successful (returns accessToken, refreshToken, userId, avatar_url, role)"
        "401":
          description: "Wrong credentials"

  /api/auth/signout:
    post:
      tags:
        - Auth
      summary: "Logout"
      security: []
      responses:
        "204":
          description: "Logout successful (no content)"

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: "Refresh access token"
      security: []
      responses:
        "200":
          description: "New access token"
        "401":
          description: "Refresh token not found"
        "403":
          description: "Invalid or expired refresh token"

  # ────────────── Users ──────────────
  /api/users/profile:
    get:
      tags:
        - Users
      summary: "Get current user profile"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Profile information"

  /api/users/avatar:
    put:
      tags:
        - Users
      summary: "Update avatar"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Avatar updated successfully"

  /api/users/change-username:
    put:
      tags:
        - Users
      summary: "Change username"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newUsername
              properties:
                currentPassword:
                  type: string
                newUsername:
                  type: string
      responses:
        "200":
          description: "Username changed successfully (returns new accessToken)"
        "401":
          description: "Current password is incorrect"
        "409":
          description: "Username already exists"

  /api/users/change-password:
    put:
      tags:
        - Users
      summary: "Change password"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: "Password changed successfully"

  /api/users/{username}:
    delete:
      tags:
        - Users
      summary: "Delete user (admin only)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "User deleted successfully"
        "403":
          description: "Admin access required"
        "404":
          description: "User not found"

  # ────────────── Ratings ──────────────
  /api/ratings/movie/{movieId}:
    get:
      tags:
        - Ratings
      summary: "Get average rating for movie (optional auth for user score)"
      security: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Rating information (averageScore, totalRatings, userScore)"

  /api/ratings:
    post:
      tags:
        - Ratings
      summary: "Create or update movie rating (upsert)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - movieId
                - score
              properties:
                movieId:
                  type: string
                score:
                  type: number
                  minimum: 1
                  maximum: 5
                moviePoster:
                  type: string
      responses:
        "200":
          description: "Rating upserted successfully"
        "400":
          description: "Invalid movie ID or score"

  /api/ratings/batch:
    post:
      tags:
        - Ratings
      summary: "Batch get ratings by movie ID list"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - movieIds
              properties:
                movieIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: "Map of movieId to average rating"

  # ────────────── Comments ──────────────
  /api/comments:
    get:
      tags:
        - Comments
      summary: "Get all comments"
      security: []
      responses:
        "200":
          description: "List of comments"
    post:
      tags:
        - Comments
      summary: "Create new comment"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - movieId
              properties:
                movieId:
                  type: string
                content:
                  type: string
                  maxLength: 500
                imageUrl:
                  type: string
                parentCommentId:
                  type: string
                movieTitle:
                  type: string
      responses:
        "201":
          description: "Comment created successfully"

  /api/comments/upload-image:
    post:
      tags:
        - Comments
      summary: "Upload image for comment"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                commentImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Image uploaded successfully (returns imageUrl)"

  /api/comments/{movieId}:
    get:
      tags:
        - Comments
      summary: "Get comments by movie ID"
      security: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Movie comments list"

  /api/comments/{id}:
    delete:
      tags:
        - Comments
      summary: "Delete comment (soft delete)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Comment deleted successfully"
        "404":
          description: "Comment not found"

  /api/comments/{id}/like:
    post:
      tags:
        - Comments
      summary: "Like/unlike comment"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
                movieTitle:
                  type: string
      responses:
        "200":
          description: "Like toggled successfully"

  # ────────────── Reports ──────────────
  /api/reports:
    post:
      tags:
        - Reports
      summary: "Create new report"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - message
              properties:
                username:
                  type: string
                  description: "Username of the reported user"
                message:
                  type: string
                commentContent:
                  type: string
      responses:
        "201":
          description: "Report created successfully"
    get:
      tags:
        - Reports
      summary: "Get all reports (admin only)"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of reports"
        "403":
          description: "No admin permission"

  /api/reports/notice:
    post:
      tags:
        - Reports
      summary: "Send notice to violating user (admin only)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                commentContent:
                  type: string
      responses:
        "200":
          description: "Notice sent successfully"
        "400":
          description: "Username is required"
        "404":
          description: "User not found"

  /api/reports/{id}:
    delete:
      tags:
        - Reports
      summary: "Delete report (admin only)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Report deleted successfully"
        "404":
          description: "Report not found"

  # ────────────── Notifications ──────────────
  /api/notifications:
    get:
      tags:
        - Notifications
      summary: "Get user notifications"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of notifications with unreadCount"

  /api/notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: "Get unread notification count"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Unread count"

  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: "Mark all notifications as read"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Marked successfully"

  /api/notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: "Mark notification as read"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Marked successfully"
        "404":
          description: "Notification not found"

  /api/notifications/{id}:
    delete:
      tags:
        - Notifications
      summary: "Delete notification"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Notification deleted"
        "404":
          description: "Notification not found"
