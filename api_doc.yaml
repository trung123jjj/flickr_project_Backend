openapi: "3.0.0"
info:
  title: "Flickr Backend API"
  version: "1.0.0"
  description: "API documentation for Flickr Backend Project"
servers:
  - url: "https://flickr-project-backend-6.onrender.com"
    description: "Production server"
  - url: "http://localhost:8080"
    description: "Development server (cleartext - do not use for production)"
components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"

paths:
  /api/auth/signup:
    post:
      tags:
        - Auth
      summary: "Register new account"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: "Registration successful"
        "400":
          description: "Invalid data"

  /api/auth/signin:
    post:
      tags:
        - Auth
      summary: "Login"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: "Login successful"
        "401":
          description: "Wrong credentials"

  /api/auth/signout:
    post:
      tags:
        - Auth
      summary: "Logout"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Logout successful"

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: "Refresh access token"
      security: []
      responses:
        "200":
          description: "New token"
        "403":
          description: "Invalid refresh token"

  /api/users:
    get:
      tags:
        - Users
      summary: "Get all users"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of users"
        "401":
          description: "Unauthorized"
    post:
      tags:
        - Users
      summary: "Create new user"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: "Created successfully"

  /api/users/profile:
    get:
      tags:
        - Users
      summary: "Get current user profile"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Profile information"

  /api/users/avatar:
    put:
      tags:
        - Users
      summary: "Update avatar"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Avatar updated successfully"

  /api/users/change-username:
    put:
      tags:
        - Users
      summary: "Change username"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newUsername:
                  type: string
      responses:
        "200":
          description: "Username changed successfully"

  /api/users/change-password:
    put:
      tags:
        - Users
      summary: "Change password"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: "Password changed successfully"

  /api/users/{username}:
    get:
      tags:
        - Users
      summary: "Get user by username"
      security: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "User information"
    put:
      tags:
        - Users
      summary: "Update user information"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: "Updated successfully"
    delete:
      tags:
        - Users
      summary: "Delete user"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Deleted successfully"

  /api/ratings/movie/{movieId}:
    get:
      tags:
        - Ratings
      summary: "Get average rating for movie"
      security: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Rating information"

  /api/ratings:
    post:
      tags:
        - Ratings
      summary: "Toggle movie rating"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
                score:
                  type: number
      responses:
        "200":
          description: "Rating successful"

  /api/ratings/user/{movieId}:
    get:
      tags:
        - Ratings
      summary: "Get current user rating for movie"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "User rating"

  /api/ratings/add:
    post:
      tags:
        - Ratings
      summary: "Add movie rating"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
                score:
                  type: number
      responses:
        "201":
          description: "Rating created successfully"

  /api/ratings/get:
    get:
      tags:
        - Ratings
      summary: "Get all ratings"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of ratings"

  /api/ratings/delete:
    delete:
      tags:
        - Ratings
      summary: "Delete rating"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
      responses:
        "200":
          description: "Deleted successfully"

  /api/ratings/update:
    put:
      tags:
        - Ratings
      summary: "Update rating"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
                score:
                  type: number
      responses:
        "200":
          description: "Updated successfully"

  /api/ratings/batch:
    post:
      tags:
        - Ratings
      summary: "Batch get ratings by movie ID list"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: "List of ratings"

  /api/comments:
    get:
      tags:
        - Comments
      summary: "Get all comments"
      security: []
      responses:
        "200":
          description: "List of comments"
    post:
      tags:
        - Comments
      summary: "Create new comment"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movieId:
                  type: string
                content:
                  type: string
      responses:
        "201":
          description: "Comment created successfully"

  /api/comments/upload-image:
    post:
      tags:
        - Comments
      summary: "Upload image for comment"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                commentImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: "Image uploaded successfully"

  /api/comments/{id}:
    get:
      tags:
        - Comments
      summary: "Get comments by movie ID"
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Movie comments list"
    delete:
      tags:
        - Comments
      summary: "Delete comment"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Deleted successfully"

  /api/comments/{id}/like:
    post:
      tags:
        - Comments
      summary: "Like/unlike comment"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Like toggled successfully"

  /api/reports:
    post:
      tags:
        - Reports
      summary: "Create new report"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetId:
                  type: string
                targetType:
                  type: string
                  enum:
                    - comment
                    - user
                reason:
                  type: string
      responses:
        "201":
          description: "Report created successfully"
    get:
      tags:
        - Reports
      summary: "Get all reports (admin)"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of reports"
        "403":
          description: "No admin permission"

  /api/reports/notice:
    post:
      tags:
        - Reports
      summary: "Send notice to violating user (admin)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: "Notice sent successfully"

  /api/reports/{id}:
    delete:
      tags:
        - Reports
      summary: "Delete report (admin)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Deleted successfully"

  /api/notifications:
    get:
      tags:
        - Notifications
      summary: "Get user notifications"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List of notifications"

  /api/notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: "Get unread notification count"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Unread count"

  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: "Mark all notifications as read"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Marked successfully"

  /api/notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: "Mark notification as read"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Marked successfully"

  /api/notifications/{id}:
    delete:
      tags:
        - Notifications
      summary: "Delete notification"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Deleted successfully"
